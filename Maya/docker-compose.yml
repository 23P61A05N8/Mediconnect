version: '3.8'

services:
  web:
    build: .
    container_name: mediconnect_app
    ports:
      - "8081:80"
    depends_on:
      - db
    links:
      - db

  db:
    image: mysql:5.7
    container_name: mediconnect_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mediconnect
    ports:
      - "3307:3306"